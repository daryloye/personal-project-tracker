<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Project Tracker</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Personal Project Tracker</h1>
        <p>Plan projects, track tasks, and generate Markdown notes with AI.</p>
      </div>
      <button id="refreshButton" type="button">Refresh</button>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>New Project</h2>
        <form id="projectForm" class="stack">
          <label>
            Title
            <input name="title" required placeholder="Personal Project Tracker">
          </label>
          <label>
            Problem
            <textarea name="problem" rows="3" placeholder="What problem does this solve?"></textarea>
          </label>
          <label>
            Target user
            <input name="targetUser" placeholder="Solo builders">
          </label>
          <label>
            Outcome
            <textarea name="outcome" rows="2" placeholder="What should be achieved?"></textarea>
          </label>
          <label>
            Tech stack
            <input name="techStack" placeholder="Node.js, static frontend, JSON storage">
          </label>
          <button type="submit">Create Project</button>
        </form>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Projects</h2>
          <span id="projectCount" class="muted">0</span>
        </div>
        <div id="projectList" class="project-list"></div>
      </section>

      <section class="panel detail-panel">
        <div class="section-title">
          <h2 id="detailTitle">Select a project</h2>
          <span id="detailStatus" class="status"></span>
        </div>
        <div id="detailContent" class="muted">Create or select a project to manage tasks and planning notes.</div>
      </section>

      <section class="panel">
        <h2>AI Settings</h2>
        <form id="settingsForm" class="stack">
          <label>
            Provider
            <select name="provider">
              <option value="none">None</option>
              <option value="openai">OpenAI</option>
              <option value="anthropic">Anthropic</option>
              <option value="gemini">Gemini</option>
            </select>
          </label>
          <label>
            Model
            <input name="model" placeholder="gpt-4.1-mini">
          </label>
          <label>
            API key
            <input name="apiKey" type="password" placeholder="Leave blank to keep existing key">
          </label>
          <label class="inline">
            <input name="clearApiKey" type="checkbox">
            Clear saved API key
          </label>
          <label class="inline">
            <input name="useCodexFallback" type="checkbox">
            Use local Codex fallback
          </label>
          <label>
            Codex command
            <input name="codexCommand" placeholder="codex">
          </label>
          <div class="button-row">
            <button type="submit">Save Settings</button>
            <button id="testProviderButton" type="button">Test</button>
          </div>
          <p id="settingsStatus" class="muted"></p>
        </form>
      </section>
    </main>

    <template id="projectDetailTemplate">
      <div class="detail-grid">
        <section>
          <h3>Summary</h3>
          <dl class="summary-list">
            <div><dt>Problem</dt><dd data-field="problem"></dd></div>
            <div><dt>Outcome</dt><dd data-field="outcome"></dd></div>
            <div><dt>Stack</dt><dd data-field="techStack"></dd></div>
          </dl>
        </section>
        <section>
          <h3>Add Task</h3>
          <form id="taskForm" class="stack compact">
            <input name="title" required placeholder="Task title">
            <textarea name="description" rows="3" placeholder="What needs to be done?"></textarea>
            <select name="priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
            <button type="submit">Add Task</button>
          </form>
        </section>
      </div>
      <section>
        <div class="section-title">
          <h3>Kanban</h3>
          <button id="planProjectButton" type="button">Plan with AI</button>
        </div>
        <div id="kanbanBoard" class="kanban-board"></div>
      </section>
      <section>
        <div class="section-title">
          <h3>Planning Notes</h3>
          <div class="button-row">
            <button id="draftReadmeButton" type="button">Generate README</button>
            <button id="downloadMarkdownButton" type="button">Download .md</button>
          </div>
        </div>
        <textarea id="draftOutput" rows="14" readonly placeholder="AI planning notes or README output appears here."></textarea>
      </section>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
